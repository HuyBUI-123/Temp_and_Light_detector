services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sensors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensors}
      POSTGRES_DB: ${POSTGRES_DB:-sensors}
    volumes:
      - db_data:/var/lib/postgresql/data
      # schema.sql runs only on first init (empty volume).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      # host 5433 (avoids a Postgres already using 5432) -> container 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sensors} -d ${POSTGRES_DB:-sensors}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sensors}:${POSTGRES_PASSWORD:-sensors}@db:5432/${POSTGRES_DB:-sensors}
      PORT: 8000
      LIGHT_ON_THRESHOLD: ${LIGHT_ON_THRESHOLD:-50}
      RETENTION_HOURS: ${RETENTION_HOURS:-24}
      CLEANUP_INTERVAL_MINUTES: ${CLEANUP_INTERVAL_MINUTES:-10}
    ports:
      # Exposed directly so the ESP32 can POST to http://<server-ip>:8000/api/readings
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
